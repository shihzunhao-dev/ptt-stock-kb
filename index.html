<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PTT 股板知識庫</title>
  <style>
    :root {
      --primary:#1a3a5c; --secondary:#0d6efd; --bg:#f0f4f8; --card:#fff;
      --border:#dee2e6; --text:#212529; --muted:#6c757d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

    /* Header */
    header{background:linear-gradient(135deg,#0f2744,#1a3a5c,#0d4f82);color:#fff;padding:0;box-shadow:0 4px 20px rgba(0,0,0,.3);}
    .header-inner{max-width:1300px;margin:0 auto;padding:28px 24px 20px;}
    .header-badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 14px;font-size:12px;letter-spacing:1px;margin-bottom:10px;}
    header h1{font-size:clamp(22px,4vw,36px);font-weight:800;margin-bottom:6px;}
    header .subtitle{font-size:14px;opacity:.8;margin-bottom:18px;}
    .header-stats{display:flex;gap:14px;flex-wrap:wrap;}
    .stat-pill{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 14px;font-size:13px;}
    .stat-pill strong{font-size:20px;display:block;}

    /* 日期導覽 */
    .date-nav-wrapper{background:#fff;border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.07);}
    .date-nav-inner{max-width:1300px;margin:0 auto;padding:0 16px;}
    .date-nav-label{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.5px;padding-top:10px;}
    #date-nav{display:flex;gap:4px;overflow-x:auto;padding:6px 0 10px;scrollbar-width:none;}
    #date-nav::-webkit-scrollbar{display:none;}
    .date-btn{padding:7px 14px;border:2px solid var(--border);border-radius:20px;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);white-space:nowrap;transition:.2s;}
    .date-btn:hover{border-color:var(--secondary);color:var(--secondary);}
    .date-btn.active{background:var(--secondary);border-color:var(--secondary);color:#fff;}

    /* Tab */
    .tab-bar{background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .tab-bar-inner{max-width:1300px;margin:0 auto;padding:0 16px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
    .tab-bar-inner::-webkit-scrollbar{display:none;}
    .tab-btn{padding:13px 18px;border:none;background:none;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;}
    .tab-btn:hover{color:var(--primary);}
    .tab-btn.active{color:var(--secondary);border-bottom-color:var(--secondary);}

    /* Main */
    .main{max-width:1300px;margin:0 auto;padding:24px 16px;}
    .tab-pane{display:none;}
    .tab-pane.active{display:block;}

    /* Day title */
    .day-title-bar{background:var(--card);border-radius:12px;padding:16px 20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:5px solid var(--secondary);}
    #day-title{font-size:15px;font-weight:700;color:var(--primary);}

    /* Metrics */
    .metrics-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:24px;}
    .metric-card{background:var(--card);border-radius:12px;padding:18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07);border-top:4px solid var(--secondary);}
    .metric-value{font-size:26px;font-weight:800;line-height:1.2;}
    .metric-label{font-size:12px;color:var(--muted);margin-top:4px;}
    .metric-sub{font-size:11px;color:var(--muted);margin-top:2px;}

    /* Events */
    .event-card{background:var(--card);border-radius:10px;padding:14px 16px;border-left:4px solid var(--secondary);box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:10px;transition:.2s;}
    .event-card:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.1);}
    .event-card.war{border-left-color:#dc3545;}
    .event-card.oil{border-left-color:#fd7e14;}
    .event-card.market{border-left-color:#198754;}
    .event-card.tsmc{border-left-color:#0d6efd;}
    .event-card.fed{border-left-color:#6f42c1;}
    .event-title{font-weight:700;font-size:14px;margin-bottom:5px;}
    .event-body{font-size:13px;color:#444;line-height:1.65;}
    .event-impact{margin-top:8px;display:flex;gap:7px;flex-wrap:wrap;}
    .impact-tag{padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600;}
    .impact-tag.up{background:#d1fae5;color:#065f46;}
    .impact-tag.down{background:#fee2e2;color:#991b1b;}
    .impact-tag.neutral{background:#e0e7ff;color:#3730a3;}

    /* Articles */
    .article-group{margin-bottom:18px;}
    .group-label{display:inline-block;padding:3px 12px;border-radius:12px;font-size:12px;font-weight:700;margin-bottom:8px;}
    .article-list{display:grid;gap:8px;}
    .article-item{background:var(--card);border-radius:10px;padding:11px 14px;display:flex;gap:10px;align-items:flex-start;box-shadow:0 1px 5px rgba(0,0,0,.06);transition:.2s;}
    .article-item:hover{box-shadow:0 3px 12px rgba(0,0,0,.1);}
    .article-item.hot{border-left:3px solid #fd7e14;}
    .art-icon{font-size:16px;margin-top:2px;flex-shrink:0;}
    .art-info{flex:1;}
    .art-title{font-size:13px;font-weight:600;margin-bottom:3px;}
    .art-title a{color:inherit;text-decoration:none;}
    .art-title a:hover{color:var(--secondary);}
    .hot-badge{font-size:11px;margin-left:6px;font-weight:700;}
    .art-meta{font-size:11px;color:var(--muted);display:flex;gap:10px;}

    /* Section title */
    .section-title{font-size:18px;font-weight:800;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border);}

    /* States */
    .empty,.loading{text-align:center;padding:32px;color:var(--muted);font-size:14px;}
    .error-msg{background:#fee2e2;color:#991b1b;border-radius:10px;padding:16px;font-size:14px;}

    /* Footer */
    footer{text-align:center;padding:24px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:40px;background:#fff;}
    footer a{color:var(--secondary);}

    @media(max-width:640px){
      .metrics-row{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-badge">PTT / Stock / 知識庫</div>
    <h1>PTT 股板重點整理</h1>
    <p class="subtitle">每日自動整理 · 爬梳重要新聞、市場脈動與投資洞察</p>
    <div class="header-stats">
      <div class="stat-pill"><strong id="day-count">—</strong>天資料</div>
      <div class="stat-pill"><strong>每日</strong>自動更新</div>
      <div class="stat-pill"><strong>08:00</strong>台灣時間</div>
    </div>
  </div>
</header>

<!-- 日期選擇器 -->
<div class="date-nav-wrapper">
  <div class="date-nav-inner">
    <div class="date-nav-label">選擇日期</div>
    <div id="date-nav">載入中…</div>
  </div>
</div>

<!-- Tab 列 -->
<div class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab-btn active" data-tab="timeline" onclick="showTab('timeline')">📅 事件時間軸</button>
    <button class="tab-btn" data-tab="articles" onclick="showTab('articles')">📰 重要文章</button>
  </div>
</div>

<main class="main">

  <!-- 當日標題 -->
  <div class="day-title-bar">
    <div id="day-title">請選擇日期…</div>
  </div>

  <!-- 指標（有資料時才顯示） -->
  <div id="metrics-content"></div>

  <!-- Tab: 時間軸 -->
  <div id="pane-timeline" class="tab-pane active">
    <h2 class="section-title">📅 當日重大事件</h2>
    <div id="timeline-content"><div class="loading">⏳ 載入中…</div></div>
  </div>

  <!-- Tab: 文章 -->
  <div id="pane-articles" class="tab-pane">
    <h2 class="section-title">📰 當日重要文章</h2>
    <div id="articles-content"><div class="loading">⏳ 載入中…</div></div>
  </div>

</main>

<footer>
  <p>PTT 股板知識庫 · 資料來源：<a href="https://www.ptt.cc/bbs/Stock/index.html" target="_blank">批踢踢實業坊 Stock 看板</a></p>
  <p style="margin-top:4px">每日 08:00 自動更新 · 僅供研究參考，不構成投資建議</p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
